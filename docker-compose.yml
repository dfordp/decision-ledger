version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: decisionledger_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: decisionledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decisionledger_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decisionledger_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/decisionledger
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - decisionledger_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decisionledger_seeder
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/decisionledger
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - decisionledger_network
    volumes:
      - .:/app
    command: python scripts/seed_data.py
    profiles:
      - seed

volumes:
  postgres_data:

networks:
  decisionledger_network:
    driver: bridge