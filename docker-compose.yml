version: '3.9'

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: decisionledger-postgres
    environment:
      POSTGRES_USER: decisionledger
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: decisionledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decisionledger -d decisionledger"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - decisionledger

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decisionledger-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://decisionledger:devpass123@postgres:5432/decisionledger
      GROQ_API_KEY: ${GROQ_API_KEY:-dummy_key_for_now}
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python scripts/init_db.py && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - decisionledger
    stdin_open: true
    tty: true

networks:
  decisionledger:
    driver: bridge

volumes:
  postgres_data: